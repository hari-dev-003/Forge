# AWS Amplify Hosting build spec (monorepo — builds the frontend only).
# In the Amplify console set the app root to this repo and add the env var
# VITE_API_URL = your API Gateway invoke URL (…/prod/api).
version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*

